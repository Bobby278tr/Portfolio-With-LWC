<template>
    <div class="background">
        <div class="spotlight"></div>

        <!-- NAVBAR -->
        <nav class="navbar">

            <div class="logo">B</div>

            <div class="menu-icon" onclick={toggleMenu}>
                <span></span>
                <span></span>
                <span></span>
            </div>

            <ul class={navClass}>

                <li><a href="#about">About</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#experience">Experience</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#education">Education</a></li>
                <li><a href="#certifications">Certifications</a></li>
                <li><a href="#contact">Contact</a></li>

            </ul>

        </nav>

        <!-- ABOUT -->
        <section id="about" class="section hero reveal">

            <div class="hero-container">

                <div class="hero-text">
                    <h1>Hi, I am Bobby Tripathi</h1>

                    <p class="summary">
                        Salesforce Developer with 1.3+ years of enterprise experience on the Salesforce Platform,
                        specializing in Apex, Lightning Web Components (LWC), and Flow-first automation within Financial
                        Services Cloud. Proven ability to deliver bulkified, metadata-driven solutions, improve data
                        quality, and reduce defects across development and testing cycles. Recognized for ownership,
                        code quality, and delivery impact.
                    </p>

                    <div class="social-links">

                        <a href="https://www.linkedin.com/in/bobby-tripathi-b178361b5/" target="_blank">
                            <img src={linkedinIcon} class="social-icon" />
                            LinkedIn
                        </a>

                        <a href="https://github.com/Bobby278tr" target="_blank">
                            <img src={gitHubIcon} class="social-icon" />
                            GitHub
                        </a>

                        <a href="https://www.salesforce.com/trailblazer/uiyqxl7o4p1l74w2gg" target="_blank">
                            <img src={trailHeadIcon} class="social-icon" />
                            Trailhead
                        </a>

                        <a href="https://docs.google.com/document/d/12L9Uj8rNYJDaQmQXQ756Aq5njzn5hmWf/edit"
                            target="_blank">
                            📄 Resume
                        </a>


                    </div>
                    <div class="badge-container">
                        <img src={doubleStarRangerIcon} class="hero-badge"
                            alt="Salesforce Double Star Ranger Certification" />
                        <img src={PDIcon} class="hero-badge" alt="Salesforce Platform Developer Certification" />
                        <img src={AgentforceIcon} class="hero-badge" alt="Salesforce Agentforce Certification" />
                    </div>
                </div>

                <div class="hero-image">
                    <img src={aboutImage} class="profile-pic" />
                </div>

            </div>

        </section>
        <div class="wave"></div>


        <!-- SKILLS -->

        <section id="tech" class="section">

            <h1>Tech Stack</h1>

            <div class="tech-container">

                <template for:each={skills.data} for:item="skill">
                    <div key={skill.Id} class="tech-card">
                        <img src={skill.Logo_URL__c} class="skill-icon" />
                        <h2>{skill.Name}</h2>
                    </div>
                </template>

            </div>

        </section>
        <div class="wave"></div>


        <!-- EXPERIENCE -->
        <section id="experience" class="section">

            <h1>Experience</h1>

            <div class="timeline">

                <template for:each={experienceData} for:item="exp">

                    <div key={exp.Id} class={exp.timelineClass}>

                        <div class="timeline-content reveal exp-card">

                            <div class="exp-header">

                                <img src={exp.Logo_URL__c} class="experience-logo" onerror={handleImageError} />

                                <div class="exp-title">

                                    <h3>{exp.Organization_Name__c}</h3>

                                    <h4>{exp.Designation__c}</h4>

                                    <div class="date-text">
                                        {exp.Start_Date__c} - {exp.End_Date__c}
                                    </div>

                                </div>

                            </div>

                            <div class="pill-container">

                                <template for:each={exp.skillsArray} for:item="skill">

                                    <span key={skill} class="skill-tag">
                                        {skill}
                                    </span>

                                </template>

                            </div>

                            <p class="exp-desc">
                                {exp.Description__c}
                            </p>

                            <img src={exp.Image_URL__c} class="exp-hover-image" />

                        </div>

                    </div>

                </template>

            </div>

        </section>
        <div class="wave"></div>


        <!-- PROJECTS -->
        <section id="projects" class="section reveal">

            <h1>Projects</h1>

            <div class="vertical-cards">

                <template for:each={projects.data} for:item="proj">

                    <div key={proj.Id} class="card project-card" data-id={proj.Id} onclick={openModal}>

                        <img src={proj.Image_URL__c} />

                        <h2>{proj.Name}</h2>

                        <p>{proj.Short_Description__c}</p>

                    </div>

                </template>

            </div>

        </section>
        <div class="wave"></div>


        <!-- PROJECT MODAL -->

        <template if:true={selectedProject}>

            <div class="modal" onclick={closeModal}>

                <div class="modal-content" onclick={stopPropagation}>

                    <span class="modal-close" onclick={closeModal}>✕</span>

                    <h2>{selectedProject.Title__c}</h2>

                    <img src={selectedProject.Image_URL__c} class="modal-project-image" />

                    <p>{selectedProject.Full_Description__c}</p>
                    <p><b>Skills:</b> {selectedProject.Skills__c}</p>
                    <a href={selectedProject.Github_Link__c} target="_blank">
                        View GitHub
                    </a>

                </div>

            </div>

        </template>


        <!-- EDUCATION -->
        <section id="education" class="section">

            <h1>Education</h1>

            <div class="timeline">

                <template for:each={educationData} for:item="edu">

                    <div key={edu.Id} class={edu.timelineClass}>

                        <div class="timeline-content reveal exp-card">

                            <div class="exp-header">

                                <img src={edu.Logo__c} class="experience-logo" onerror={handleImageError} />

                                <div class="exp-title">

                                    <h3>{edu.School_Name__c}</h3>
                                    <h4>{edu.Degree__c}</h4>

                                    <div class="date-text">
                                        {edu.Start_Date__c} - {edu.End_Date__c}
                                    </div>

                                </div>

                            </div>

                            <p><b>Grade:</b> {edu.Grade__c}</p>

                            <p class="exp-desc">
                                {edu.Description__c}
                            </p>

                        </div>

                    </div>

                </template>

            </div>

        </section>
        <div class="wave"></div>


        <!-- CERTIFICATIONS -->
        <section id="certifications" class="section reveal">

            <h1>Certifications</h1>

            <div class="vertical-cards">

                <template for:each={certifications.data} for:item="cert">

                    <div key={cert.Id} class="card">

                        <img src={cert.Image_URL__c} />

                        <h2>{cert.Name}</h2>

                        <p>{cert.Issued_By__c}</p>

                        <a href={cert.Credential_Link__c} target="_blank">
                            View Credential
                        </a>

                    </div>

                </template>

            </div>

        </section>
        <div class="wave"></div>


        <!-- CONTACT -->
        <section id="contact" class="section">

            <h1>Let's Connect</h1>

            <div class="contact-container">

                <div class="contact-text">

                    <h1>Have a project in mind?</h1>

                    <h2>Let's build something amazing together 🚀</h2>

                </div>

                <div class="contact-form">

                    <input type="text" placeholder="Full Name" value={name} onchange={handleName}>

                    <input type="email" placeholder="Email Address" value={email} onchange={handleEmail}>

                    <input type="text" placeholder="Subject" value={subject} onchange={handleSubject}>

                    <textarea placeholder="Message" value={body} onchange={handleBody}></textarea>

                    <button onclick={sendContact}>Send Message</button>

                </div>

            </div>

        </section>
    </div>
</template>
