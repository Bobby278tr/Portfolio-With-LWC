<template>
<div class="background">

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#experience">Experience</a>
        <a href="#projects">Projects</a>
        <a href="#education">Education</a>
        <a href="#certifications">Certifications</a>
        <a href="#contact">Contact</a>
    </nav>

    <!-- ABOUT -->
    <section id="about" class="section hero reveal">

        <div class="hero-container">

            <div class="hero-text">
                <h1>Your Name</h1>

                <p class="summary">
                    Passionate Salesforce Developer building scalable
                    LWC and Apex applications.
                </p>

                <div class="social-links">

                    <a href="https://linkedin.com" target="_blank">
                        <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" class="social-icon"/>
                        LinkedIn
                    </a>

                    <a href="https://github.com" target="_blank">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733553.png" class="social-icon"/>
                        GitHub
                    </a>

                    <a href="https://trailhead.salesforce.com" target="_blank">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Salesforce_logo.svg" class="social-icon"/>
                        Trailhead
                    </a>

                    <a href="/resource/resume" target="_blank">
                        📄 Resume
                    </a>

                </div>
            </div>

            <div class="hero-image">
                <img src={aboutImage} class="profile-pic"/>
            </div>

        </div>

    </section>


    <!-- SKILLS -->
    <section id="skills" class="section reveal">

        <h1>Skills</h1>

        <div class="skills-grid">

            <template for:each={skills.data} for:item="skill">

                <div key={skill.Id} class="skill-badge">

                    <img src={skill.Logo_URL__c} class="skill-icon"/>

                    <span>{skill.Name}</span>

                </div>

            </template>

        </div>

    </section>


    <!-- EXPERIENCE -->
    <section id="experience" class="section">

        <h1>Experience</h1>

        <div class="timeline">

            <template for:each={experienceData} for:item="exp">

                <div key={exp.Id} class={exp.timelineClass}>

                    <div class="timeline-content reveal exp-card">

                        <div class="date-badge">
                            {exp.Start_Date__c} - {exp.End_Date__c}
                        </div>

                        <img src={exp.Logo_URL__c}
                             class="experience-logo"
                             onerror={handleImageError}/>

                        <h3>{exp.Organization_Name__c}</h3>

                        <h4>{exp.Designation__c}</h4>

                        <lightning-pill label={exp.Skill__c}></lightning-pill>

                        <p>{exp.Description__c}</p>

                        <img src={exp.Image_URL__c} class="exp-hover-image"/>

                    </div>

                </div>

            </template>

        </div>

    </section>


    <!-- PROJECTS -->
    <section id="projects" class="section reveal">

        <h1>Projects</h1>

        <div class="vertical-cards">

            <template for:each={projects.data} for:item="proj">

                <div key={proj.Id}
                     class="card project-card"
                     data-id={proj.Id}
                     onclick={openModal}>

                    <img src={proj.Image_URL__c}/>

                    <h3>{proj.Name}</h3>

                    <p>{proj.Short_Description__c}</p>

                </div>

            </template>

        </div>

    </section>


    <!-- PROJECT MODAL -->
    <template if:true={selectedProject}>

        <section class="modal">

            <div class="modal-content">

                <h2>{selectedProject.Name}</h2>

                <img src={selectedProject.Image_URL__c}/>

                <p>{selectedProject.Full_Description__c}</p>

                <p><b>Skills:</b> {selectedProject.Skills__c}</p>

                <a href={selectedProject.Github_Link__c} target="_blank">
                    View GitHub
                </a>

                <br/><br/>

                <lightning-button
                    label="Close"
                    onclick={closeModal}>
                </lightning-button>

            </div>

        </section>

    </template>


    <!-- EDUCATION -->
    <section id="education" class="section">

        <h1>Education</h1>

        <div class="timeline">

            <template for:each={educationData} for:item="edu">

                <div key={edu.Id} class={edu.timelineClass}>

                    <div class="timeline-content reveal">

                        <div class="date-badge">
                            {edu.Start_Date__c} - {edu.End_Date__c}
                        </div>

                        <img src={edu.Logo_URL__c}
                             class="experience-logo"
                             onerror={handleImageError}/>

                        <h3>{edu.School_Name__c}</h3>

                        <p>{edu.Description__c}</p>

                    </div>

                </div>

            </template>

        </div>

    </section>


    <!-- CERTIFICATIONS -->
    <section id="certifications" class="section reveal">

        <h1>Certifications</h1>

        <div class="vertical-cards">

            <template for:each={certifications.data} for:item="cert">

                <div key={cert.Id} class="card">

                    <img src={cert.Image_URL__c}/>

                    <h3>{cert.Name}</h3>

                    <p>{cert.Issued_By__c}</p>

                    <a href={cert.Credential_Link__c} target="_blank">
                        View Credential
                    </a>

                </div>

            </template>

        </div>

    </section>


    <!-- CONTACT -->
    <section id="contact" class="section reveal">

        <h1>Let’s Connect</h1>

        <div class="contact-wrapper">

            <div class="contact-left">

                <h3>Have a project in mind?</h3>

                <p>Let’s build something amazing together 🚀</p>

            </div>

            <div class="contact-form slds-card slds-p-around_large">

                <lightning-input
                    type="email"
                    label="Email Address"
                    variant="label-stacked"
                    onchange={handleEmail}>
                </lightning-input>

                <lightning-input
                    label="Subject"
                    variant="label-stacked"
                    class="slds-m-top_medium"
                    onchange={handleSubject}>
                </lightning-input>

                <lightning-textarea
                    label="Message"
                    variant="label-stacked"
                    class="slds-m-top_medium"
                    onchange={handleBody}>
                </lightning-textarea>

                <div class="slds-m-top_large">

                    <lightning-button
                        label="Send Message"
                        variant="brand"
                        onclick={sendContact}>
                    </lightning-button>

                </div>

            </div>

        </div>

    </section>

</div>
</template>
